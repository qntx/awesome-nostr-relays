# =============================================================================
# Awesome Nostr Relays — single source of truth
# =============================================================================
# Edit this file to add / remove / reclassify relays.
# CI will regenerate:
#   - README.md (section between <!-- RELAYS:START --> and <!-- RELAYS:END -->)
#   - api/relays.json        (full dataset with health status)
#   - api/urls.json           (flat list of URLs only)
#   - api/collections.json    (grouped by collection)
#
# Conventions
# -----------
# - URL: MUST be `wss://` (WebSocket Secure) or `ws://` for onion services;
#        include trailing slash for root paths (e.g. `wss://relay.damus.io/`).
# - network: optional; auto-derived from the URL host (`.onion` → tor,
#            `.i2p` → i2p, `.loki` → loki, otherwise clearnet). Set explicitly
#            only to override. NIP-66 `n`.
# - country: ISO 3166-1 alpha-2 uppercase (e.g. "US", "JP", "DE"); use "XX" for
#            unknown. Omit for hidden-service-only relays.
# - geohash: optional NIP-52 geohash for finer-grained location (NIP-66 `g`).
# - requirements: optional table of posting policies (NIP-66 `R`), e.g.
#                 `requirements = { payment = true, auth = true }`.
# - topics: optional free-form lowercase tags for discovery (NIP-66 `t`).
# - collections: each relay MUST reference at least one existing collection id.
# - Keep entries sorted alphabetically by `url` within each block for easier
#   diffs and merges.
# =============================================================================

schema_version = "2"

# -----------------------------------------------------------------------------
# Collections — discovery taxonomy
# -----------------------------------------------------------------------------
[[collections]]
id = "featured"
name = "Featured"
description = "Hand-picked, widely adopted relays with strong operational track record."

[[collections]]
id = "global"
name = "Global Feeds"
description = "General-purpose relays that accept events from any pubkey."

[[collections]]
id = "community"
name = "Curated Communities"
description = "Relays that focus on community-driven content and curation."

[[collections]]
id = "special"
name = "Special Purpose"
description = "Relays with unique filtering rules, display mechanisms, or event constraints."

[[collections]]
id = "topic"
name = "Interest Groups"
description = "Single-topic relays for focused discussions."

[[collections]]
id = "bot"
name = "Automated Feeds"
description = "Relays that primarily serve bot / algorithm / news feeds."

[[collections]]
id = "search"
name = "Search & Index"
description = "Relays exposing NIP-50 search or acting as indexers."

[[collections]]
id = "paid"
name = "Paid Relays"
description = "Relays that require payment (admission, subscription, or per-event) to post."

[[collections]]
id = "wot"
name = "Web of Trust"
description = "Relays filtering content by web-of-trust policies."

[[collections]]
id = "bridge"
name = "Bridges & Aggregators"
description = "Relays that bridge other networks (ActivityPub, RSS, etc.) or aggregate content."

[[collections]]
id = "regional-americas"
name = "Regional — Americas"
description = "Relays operated in North & South America."

[[collections]]
id = "regional-europe"
name = "Regional — Europe"
description = "Relays operated in Europe."

[[collections]]
id = "regional-asia"
name = "Regional — Asia / Pacific"
description = "Relays operated in Asia and the Pacific."

[[collections]]
id = "language"
name = "Language Communities"
description = "Relays scoped by spoken language."

[[collections]]
id = "tor"
name = "Tor / Onion"
description = "Relays reachable via Tor hidden services (.onion)."

