name: Build

# Regenerates only the README catalog section on `main` when the curated
# source changes. The machine-readable `api/` artefacts are NOT committed to
# `main` — they live on the `data` branch and are refreshed by health-check.yml.
on:
  push:
    branches: [main]
    paths:
      - "relays.toml"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/build.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  readme:
    name: Regenerate README catalog section
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build binary
        run: cargo build --release --quiet --bin relays

      - name: Regenerate README
        # `build` also writes ./api (git-ignored on main); only README.md is
        # committed below.
        run: ./target/release/relays build

      - name: Commit README if changed
        uses: stefanzweifel/git-auto-commit-action@v7.1.0
        with:
          commit_message: "chore(catalog): regenerate README section [skip ci]"
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
          file_pattern: "README.md"
