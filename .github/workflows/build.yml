name: Build

on:
  push:
    branches: [main]
    paths:
      - "relays.toml"
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/build.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    name: Regenerate api/*.json and README
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build binary
        run: cargo build --release --quiet --bin relays

      - name: Regenerate artefacts
        run: ./target/release/relays build

      - name: Commit and push if changed
        uses: stefanzweifel/git-auto-commit-action@v7.1.0
        with:
          commit_message: "chore(data): regenerate api/*.json and README [skip ci]"
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
          file_pattern: "api/ README.md"

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: relays-api
          path: api/
          retention-days: 14
