name: Health Check

# Probes every catalogued relay hourly (at minute 0) and commits the updated
# `health.json` + regenerated `api/` + README back to `main`. Downstream
# clients see probe data that is at most ~1h stale.
#
# Trade-off: hourly probes mean ~24 hits/day per relay. Small community relays
# may treat this as abusive — switch to `0 */6 * * *` (every 6h) or
# `0 */3 * * *` (every 3h) if operators push back.
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      concurrency:
        description: "Max concurrent probes"
        required: false
        default: "32"
      timeout:
        description: "Per-relay timeout in seconds"
        required: false
        default: "30"

permissions:
  contents: write

concurrency:
  group: health-check
  cancel-in-progress: false

jobs:
  probe:
    name: Probe relays and update health.json
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build binary
        run: cargo build --release --quiet --bin relays

      - name: Run probe
        env:
          RUST_LOG: info
        run: |
          ./target/release/relays check \
            --concurrency "${{ github.event.inputs.concurrency || '32' }}" \
            --timeout     "${{ github.event.inputs.timeout     || '30' }}"

      - name: Commit and push if changed
        uses: stefanzweifel/git-auto-commit-action@v7.1.0
        with:
          commit_message: "chore(health): update health.json and regenerate artefacts [skip ci]"
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
          file_pattern: "health.json api/ README.md"

      - name: Upload health artefacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: health-${{ github.run_number }}
          path: |
            health.json
            api/
          retention-days: 30
