name: Health Check

# Probes every catalogued relay and publishes the refreshed health snapshot +
# regenerated API artefacts to the orphan `data` branch — never to `main`.
# GitHub Pages redeploys from `data` (see pages.yml), so downstream clients see
# status that is at most ~3h stale without polluting the source history.
#
# Trade-off: every 3h means ~8 hits/day per relay. Tighten to `0 * * * *`
# (hourly) or loosen to `0 */6 * * *` if operators ask.
on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:
    inputs:
      concurrency:
        description: "Max concurrent probes"
        required: false
        default: "32"
      timeout:
        description: "Per-relay timeout in seconds"
        required: false
        default: "30"

permissions:
  contents: write

# Single writer for the `data` branch; never cancel a publish midway.
concurrency:
  group: data-branch
  cancel-in-progress: false

jobs:
  probe:
    name: Probe relays and publish to data branch
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build binary
        run: cargo build --release --quiet --bin relays

      - name: Seed health.json from data branch
        run: |
          git fetch origin data --depth=1 2>/dev/null || true
          if git show origin/data:health.json > health.json 2>/dev/null; then
            echo "seeded existing health.json"
          else
            rm -f health.json
            echo "no existing health.json; starting fresh"
          fi

      - name: Probe relays
        env:
          RUST_LOG: info
        run: |
          ./target/release/relays check \
            --skip-build \
            --concurrency "${{ github.event.inputs.concurrency || '32' }}" \
            --timeout     "${{ github.event.inputs.timeout     || '30' }}"

      - name: Regenerate API artefacts
        run: |
          ./target/release/relays build --output _publish --skip-readme
          cp health.json _publish/health.json

      - name: Validate health snapshot against schema
        run: |
          pipx run check-jsonschema \
            --schemafile _publish/schema/health-report.schema.json \
            _publish/health.json

      - name: Publish to data branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: data
          folder: _publish
          commit-message: "chore(data): refresh health snapshot and api artefacts"
          git-config-name: github-actions[bot]
          git-config-email: github-actions[bot]@users.noreply.github.com

      - name: Upload health artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: health-${{ github.run_number }}
          path: _publish
          retention-days: 30
