name: Pages

# Publishes the combined `web/` landing page and `api/` JSON directory to
# GitHub Pages. Downstream apps get proper `Content-Type: application/json`,
# permissive CORS, and no `raw.githubusercontent.com` rate-limit.
#
# Triggers:
#   - Push to `main` that touches `web/`, `api/`, or `CNAME`.
#   - Manual dispatch.
on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "api/**"
      - "CNAME"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Only one concurrent deployment; newer pushes supersede in-flight runs so
# the latest data always wins.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site
          cp -r web/. _site/
          cp -r api/. _site/
          cp CNAME _site/CNAME

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
