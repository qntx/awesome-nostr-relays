name: Pages

# Publishes the static site to GitHub Pages: the `web/` landing shell from
# `main`, combined with the JSON API + health snapshot + schemas from the
# `data` branch. Downstream apps get `Content-Type: application/json`,
# permissive CORS, and no `raw.githubusercontent.com` rate limit.
#
# Triggers: web/CNAME changes on `main`; completion of a Health Check run
# (which publishes fresh data); and manual dispatch.
on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "CNAME"
      - ".github/workflows/pages.yml"
  workflow_run:
    workflows: ["Health Check"]
    types: [completed]
  workflow_dispatch:

# Only one concurrent deployment; newer runs supersede in-flight ones so the
# latest data always wins.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout main (site shell)
        uses: actions/checkout@v4

      - name: Checkout data branch (api + health + schema)
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: data
          path: _data

      - name: Assemble site
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site
          cp -r web/. _site/
          cp CNAME _site/CNAME
          # The data branch holds relays.json, urls.json, collections.json,
          # badge.json, nip66.json, health.json and schema/. It is absent only
          # before the first Health Check run.
          if [ -d _data ]; then
            cp -r _data/. _site/
          fi
          rm -rf _site/.git

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
